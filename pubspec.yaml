name: adapted
description: A neuro-inclusive adaptive Flutter application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.2
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  firebase_ui_auth: ^3.0.1
  file_picker: ^10.3.10
  firebase_storage: ^13.0.6
  firebase_ui_oauth_google: ^2.0.1
  flutter_tts: ^4.2.5
  fl_chart: ^1.1.1
  http: ^1.6.0
  read_pdf_text: ^0.3.1
  flutter_dotenv: ^5.1.0
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - .env




